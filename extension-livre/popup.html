<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        width: 280px;
        margin: 0;
        padding: 14px;
        background: #141414;
        color: #fff;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      p {
        font-size: 11px;
        opacity: 0.75;
        line-height: 1.5;
        margin: 0 0 12px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        padding: 6px 8px;
        font-size: 11px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
      }
      .ok {
        color: hsl(140, 60%, 65%);
      }
      .warn {
        color: hsl(40, 90%, 65%);
      }
    </style>
  </head>
  <body>
    <h1>🐛 Lovable Free Tools</h1>
    <p>
      Detecta projetos Lovable e injeta um popup flutuante. Use "Gerar Erro" → clique
      em <b>Try to Fix</b> no overlay para executar via fluxo nativo.
    </p>
    <label>
      <input type="checkbox" id="enabled" checked />
      Ativar injeção automática
    </label>
    <div id="status" class="status">Verificando aba…</div>
    <script src="popup.js"></script>
  </body>
</html>
