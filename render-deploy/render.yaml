# ============================================================
# Render Blueprint — Kênia Garcia Advocacia (oficial-2026)
# ============================================================
# Como usar:
#   1. Copie este arquivo para a RAIZ do repositório que você
#      subiu no GitHub a partir do oficial-2026-main.zip
#      (mesmo nível de backend/, baileys-service/, frontend/).
#   2. No Render: New + → Blueprint → escolha o repo → Apply.
#   3. Render cria os 3 serviços abaixo automaticamente.
#   4. Preencha as variáveis marcadas com `sync: false`
#      (segredos) no painel de cada serviço.
#   5. Depois do 1º deploy, copie as URLs geradas e atualize
#      BAILEYS_URL, BACKEND_WEBHOOK, CORS_ORIGINS e
#      REACT_APP_BACKEND_URL nos serviços correspondentes.
# ============================================================

services:
  # -----------------------------------------------------------
  # 1) Backend — FastAPI (Python 3.11)
  # -----------------------------------------------------------
  - type: web
    name: kenia-backend
    runtime: python
    plan: starter
    region: oregon            # troque para o mais próximo se preferir
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_NAME
        value: kenia_garcia_prod
      - key: ADMIN_EMAIL
        value: admin@kenia-garcia.com.br
      # ---- SEGREDOS (preencher no painel) ----
      - key: MONGO_URL
        sync: false           # mongodb+srv://... do Atlas
      - key: JWT_SECRET
        generateValue: true   # Render gera 256-bit aleatório
      - key: BAILEYS_INTERNAL_TOKEN
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      # ---- URLs cruzadas (preencher depois do 1º deploy) ----
      - key: BAILEYS_URL
        sync: false           # ex: https://kenia-baileys.onrender.com
      - key: BACKEND_WEBHOOK
        sync: false           # https://kenia-backend.onrender.com/api/whatsapp/webhook/baileys
      - key: CORS_ORIGINS
        sync: false           # https://kenia-frontend.onrender.com,https://kenia-garcia.com.br

  # -----------------------------------------------------------
  # 2) Baileys sidecar — Node.js + DISCO PERSISTENTE
  # -----------------------------------------------------------
  - type: web
    name: kenia-baileys
    runtime: node
    plan: starter
    region: oregon
    rootDir: baileys-service
    buildCommand: "npm install --omit=dev"
    startCommand: "node server.js"
    autoDeploy: true
    disk:
      name: baileys-auth
      mountPath: /opt/render/project/src/auth_info
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: BAILEYS_PORT
        value: 10000          # Render injeta $PORT; server.js usa BAILEYS_PORT||$PORT
      # ---- SEGREDOS / URLs cruzadas ----
      - key: BAILEYS_INTERNAL_TOKEN
        sync: false           # MESMO valor do backend
      - key: BACKEND_WEBHOOK
        sync: false           # https://kenia-backend.onrender.com/api/whatsapp/webhook/baileys

  # -----------------------------------------------------------
  # 3) Frontend — React (CRA + craco) como Static Site
  # -----------------------------------------------------------
  - type: web
    name: kenia-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "yarn install --frozen-lockfile && yarn build"
    staticPublishPath: build
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite           # SPA fallback p/ React Router
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: REACT_APP_BACKEND_URL
        sync: false             # https://kenia-backend.onrender.com
      - key: CI
        value: "false"          # CRA não falha o build em warnings
